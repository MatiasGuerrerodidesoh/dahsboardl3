<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Consolidado FNDR L3 — DIDESOH</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --azul:#0B2545; --azul2:#1E3A5F; --azul3:#315D88;
    --bg:#F4F6F9; --texto:#17202A; --muted:#65717E; --borde:#DCE2EA;
    --verde:#2E7D32; --verde-bg:#E8F5E9;
    --amarillo:#B77900; --amarillo-bg:#FFF8E1;
    --rojo:#C62828; --rojo-bg:#FFEBEE;
    --morado:#6A1B9A; --morado-bg:#F3E5F5;
    --gris:#546E7A; --gris-bg:#ECEFF1;
  }
  *{box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;margin:0;background:var(--bg);color:var(--texto)}
  header{background:linear-gradient(135deg,var(--azul),var(--azul2));color:#fff;padding:18px 24px;display:flex;justify-content:space-between;gap:20px;align-items:center;box-shadow:0 2px 10px #0002}
  header h1{font-size:21px;margin:0 0 3px;font-weight:700}
  header .sub{font-size:12px;opacity:.82}
  .header-right{text-align:right;font-size:12px}
  button{font:inherit}
  .reload{margin-top:7px;background:#ffffff18;color:#fff;border:1px solid #ffffff45;border-radius:5px;padding:6px 11px;cursor:pointer}
  .container{max-width:1700px;margin:auto;padding:20px 24px 32px}
  .notice{display:none;background:var(--amarillo-bg);border-left:4px solid var(--amarillo);padding:12px 14px;border-radius:6px;margin-bottom:15px;font-size:13px}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;margin-bottom:16px}
  .kpi{background:#fff;border-radius:9px;padding:14px 15px;border-left:4px solid var(--azul3);box-shadow:0 1px 5px #0000000d;min-height:83px}
  .kpi .label{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.45px}
  .kpi .value{font-size:27px;font-weight:750;margin-top:4px;color:var(--azul)}
  .kpi .detail{font-size:11px;color:var(--muted);margin-top:2px}
  .kpi.verde{border-left-color:var(--verde)} .kpi.verde .value{color:var(--verde)}
  .kpi.amarillo{border-left-color:var(--amarillo)} .kpi.amarillo .value{color:var(--amarillo)}
  .kpi.morado{border-left-color:var(--morado)} .kpi.morado .value{color:var(--morado)}
  .kpi.rojo{border-left-color:var(--rojo)} .kpi.rojo .value{color:var(--rojo)}
  .panel{background:#fff;border-radius:9px;box-shadow:0 1px 5px #0000000d;margin-bottom:16px}
  .panel-title{padding:13px 16px;border-bottom:1px solid var(--borde);font-weight:700;font-size:14px;display:flex;justify-content:space-between;gap:12px;align-items:center}
  .stage-summary{display:grid;grid-template-columns:minmax(330px,1fr) minmax(330px,1fr) minmax(260px,.75fr);gap:12px;padding:15px}
  .stage-card{border:1px solid var(--borde);border-radius:9px;background:#fff;overflow:hidden;min-width:0}
  .stage-card-head{padding:12px 13px;background:#F7F9FC;border-bottom:1px solid var(--borde)}
  .stage-card-head h3{font-size:13px;margin:0;color:var(--azul)}
  .stage-card-head p{font-size:10.5px;color:var(--muted);margin:3px 0 0}
  .status-list{padding:8px 12px 11px}
  .status-row{display:grid;grid-template-columns:minmax(0,1fr) 42px;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid #EEF2F6}
  .status-row:last-child{border-bottom:0}
  .status-label{font-size:11px;font-weight:650;line-height:1.25}
  .status-count{text-align:right;font-size:18px;font-weight:750;color:var(--azul)}
  .mini-bar{height:4px;background:#E7ECF2;border-radius:4px;margin-top:5px;overflow:hidden}
  .mini-bar i{display:block;height:100%;border-radius:4px;background:var(--azul3)}
  .milestones{display:grid;grid-template-columns:1fr;gap:8px;padding:12px}
  .milestone{border:1px solid var(--borde);border-radius:8px;padding:11px;background:#fff}
  .milestone .n{font-size:22px;font-weight:750;color:var(--azul)}
  .milestone .t{font-size:11px;color:var(--muted);margin-top:2px}
  .milestone .bar{height:5px;background:#E7ECF2;border-radius:4px;margin-top:8px;overflow:hidden}
  .milestone .bar i{display:block;height:100%;background:var(--morado);border-radius:4px}
  .filters{display:flex;flex-wrap:wrap;gap:10px;align-items:end;padding:13px 15px}
  .filters label{display:flex;flex-direction:column;font-size:10.5px;color:var(--muted);gap:4px}
  .filters input,.filters select{border:1px solid var(--borde);border-radius:5px;padding:7px 8px;font-size:12.5px;min-width:145px;background:#fff}
  .filters input{min-width:240px}
  .filters button{background:var(--azul);color:#fff;border:0;border-radius:5px;padding:8px 13px;cursor:pointer}
  .tabs{display:flex;gap:4px;padding:0 15px;border-bottom:1px solid var(--borde);overflow-x:auto}
  .tab{background:none;border:0;padding:11px 12px;cursor:pointer;color:var(--muted);white-space:nowrap;border-bottom:3px solid transparent}
  .tab.active{color:var(--azul);font-weight:700;border-bottom-color:var(--azul)}
  .table-wrap{overflow:auto;max-height:66vh}
  table{border-collapse:collapse;width:100%;font-size:12px;min-width:1280px}
  th{position:sticky;top:0;background:var(--azul);color:#fff;text-align:left;padding:9px 8px;border-right:1px solid #ffffff24;z-index:2;cursor:pointer;white-space:nowrap}
  td{padding:8px;border-bottom:1px solid #E8EDF3;vertical-align:top}
  tbody tr:hover{background:#F0F5FA}
  .project{font-weight:650;max-width:300px}
  .org{max-width:220px;color:#34495E}
  .muted{color:#8A949E}
  .pill{display:inline-block;padding:3px 7px;border-radius:12px;font-size:10.5px;font-weight:650;line-height:1.25;white-space:nowrap}
  .pill.verde{background:var(--verde-bg);color:var(--verde)}
  .pill.amarillo{background:var(--amarillo-bg);color:#805600}
  .pill.rojo{background:var(--rojo-bg);color:var(--rojo)}
  .pill.morado{background:var(--morado-bg);color:var(--morado)}
  .pill.gris{background:var(--gris-bg);color:var(--gris)}
  .link{display:inline-block;color:var(--azul);font-weight:650;text-decoration:none;margin:1px 5px 1px 0}
  .link:hover{text-decoration:underline}
  .alert-dot{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:var(--rojo-bg);color:var(--rojo);font-weight:800;font-size:11px;cursor:help}
  .detail-btn{border:1px solid var(--borde);background:#fff;border-radius:5px;padding:5px 8px;cursor:pointer;color:var(--azul)}
  .empty,.loading{text-align:center;padding:50px;color:#8B96A3}
  .footer{text-align:center;color:#8B96A3;font-size:11px;padding:20px 0 0}
  .drawer-backdrop{position:fixed;inset:0;background:#0005;display:none;z-index:20}
  .drawer{position:absolute;right:0;top:0;height:100%;width:min(720px,95vw);background:#fff;overflow:auto;box-shadow:-5px 0 20px #0003;padding:20px}
  .drawer h2{font-size:19px;margin:0 35px 3px 0;color:var(--azul)}
  .drawer .close{position:absolute;right:16px;top:14px;border:0;background:#EEF2F6;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:18px}
  .drawer-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin:16px 0}
  .field{border:1px solid var(--borde);border-radius:7px;padding:10px;min-height:60px}
  .field .k{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  .field .v{font-size:13px;margin-top:4px;white-space:pre-wrap;word-break:break-word}
  .field.wide{grid-column:1/-1}
  @media(max-width:1100px){.stage-summary{grid-template-columns:1fr 1fr}.stage-card.milestone-card{grid-column:1/-1}.milestones{grid-template-columns:repeat(3,1fr)}}
  @media(max-width:800px){header{align-items:flex-start}.container{padding:14px}.stage-summary{grid-template-columns:1fr}.stage-card.milestone-card{grid-column:auto}.milestones{grid-template-columns:1fr}.filters input{min-width:190px}.drawer-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <div>
    <h1>🛰 Dashboard Consolidado FNDR L3</h1>
    <div class="sub">Factibilidad · Admisibilidad y Consistencia Técnica · Priorización CORE · Ejecución</div>
  </div>
  <div class="header-right">
    <div id="updatedAt">Cargando…</div>
    <div id="sourceCounts"></div>
    <button class="reload" id="reloadBtn">↻ Recargar</button>
  </div>
</header>
<div class="container">
  <div id="notice" class="notice"></div>
  <div id="kpis" class="kpis"></div>
  <section class="panel">
    <div class="panel-title"><span>Estados por etapa</span><span id="visibleCount" class="muted"></span></div>
    <div id="pipeline" class="stage-summary"></div>
  </section>
  <section class="panel">
    <div class="filters">
      <label>Buscar<input id="fBuscar" placeholder="N°, proyecto, institución o RUT"></label>
      <label>Etapa<select id="fEtapa"><option value="">Todas</option></select></label>
      <label>Fondo<select id="fFondo"><option value="">Todos</option></select></label>
      <label>Comuna<select id="fComuna"><option value="">Todas</option></select></label>
      <label>Evaluador/a<select id="fEvaluador"><option value="">Todas/os</option></select></label>
      <button id="clearBtn">Limpiar</button>
    </div>
    <div class="tabs" id="tabs">
      <button class="tab active" data-view="consolidado">Consolidado</button>
      <button class="tab" data-view="factibilidad">Factibilidad</button>
      <button class="tab" data-view="ac">A&C</button>
      <button class="tab" data-view="core">CORE y ejecución</button>
      <button class="tab" data-view="alertas">Alertas</button>
    </div>
    <div class="table-wrap"><table><thead><tr id="thead"></tr></thead><tbody id="tbody"><tr><td class="loading">Cargando datos…</td></tr></tbody></table></div>
  </section>
  <div class="footer">DIDESOH · Gobierno Regional de Valparaíso · Cruce por N° de postulación</div>
</div>
<div id="drawerBackdrop" class="drawer-backdrop"><aside class="drawer" id="drawer"><button class="close" id="drawerClose">×</button><div id="drawerContent"></div></aside></div>
<script>
const PARAM_API = new URLSearchParams(location.search).get('api');
const API_URL = PARAM_API || 'https://script.google.com/macros/s/AKfycbzu3VY4_WHV66VQiDPZxK-AISko4sTtGmCVDtrxzJ4VbIY4URVSfHMP8NEfLju7NqE4/exec';
const FACTIBILIDAD_ESTADOS=['HABILITAR FORMULACIÓN DE EXPEDIENTE','DESESTIMAR','EVALUACIÓN PENDIENTE','OBSERVAR PARA SUBSANACIÓN'];
const AC_ESTADOS=['EVALUACIÓN TÉCNICA FAVORABLE','DESESTIMADO POR NO SUBSANACIÓN','REVISIÓN PENDIENTE','CON OBSERVACIONES'];
const VIEWS={
consolidado:[['nPostulacion','N°',55],['nombreProyecto','Proyecto',270],['institucion','Institución',210],['fondo','Fondo',90],['monto','Monto',105,'money'],['etapa','Etapa',150,'stage'],['estadoFactibilidad','Factibilidad',200,'status'],['dictamenAC','Dictamen A&C',190,'status'],['acuerdoCoreNumero','Acuerdo CORE',105,'core'],['resolucionNumero','Resolución',105,'resolution'],['estadoEjecucion','Ejecución',110,'status'],['alertas','⚠',42,'alerts'],['_detail','Detalle',65,'detail']],
factibilidad:[['nPostulacion','N°',55],['nombreProyecto','Proyecto',280],['evaluadorFactibilidad','Evaluador/a',130],['estadoFactibilidad','Estado',225,'status'],['tandaFactibilidad','Tanda',55],['observacionesFactibilidad','Obs.',55],['fechaRevisionFactibilidad','Última revisión',105,'date'],['diasDesdeEnvioFactibilidad','Días envío',75,'days'],['estadoGestionOrganizacion','Gestión org.',130,'status'],['enlacePautaFactibilidad','Pauta',65,'link'],['_detail','Detalle',65,'detail']],
ac:[['nPostulacion','N°',55],['nombreProyecto','Proyecto',280],['evaluadorAC','Evaluador/a',130],['rondaAC','Ronda',55],['dictamenAC','Dictamen',210,'status'],['estadoAC','Estado proyecto',170,'status'],['observacionesAbiertasAC','Obs. abiertas',75],['observacionesCerradasAC','Obs. cerradas',75],['fechaEvaluacionAC','Fecha evaluación',105,'date'],['enlacePautaAC','Pauta',65,'link'],['pdfAC','PDF',55,'link'],['_detail','Detalle',65,'detail']],
core:[['nPostulacion','N°',55],['nombreProyecto','Proyecto',270],['pronunciamiento','Pronunciamiento',180,'status'],['acuerdoCoreNumero','N° acuerdo',85],['acuerdoCoreFecha','Fecha acuerdo',100,'date'],['acuerdoCoreUrl','Acuerdo',65,'link'],['resolucionNumero','N° resolución',90],['resolucionFecha','Fecha resolución',105,'date'],['resolucionUrl','Resolución',70,'link'],['fechaInicioEjecucion','Inicio',90,'date'],['fechaTerminoEjecucion','Término',90,'date'],['estadoEjecucion','Ejecución',115,'status'],['_detail','Detalle',65,'detail']],
alertas:[['nPostulacion','N°',55],['nombreProyecto','Proyecto',290],['etapa','Etapa',150,'stage'],['alertas','Alertas',420,'alertText'],['_detail','Detalle',65,'detail']]};
let RAW=[],FILTERED=[],CURRENT_VIEW='consolidado',SORT={key:'nPostulacion',dir:1};
function loadJsonp(url,timeoutMs=30000){return new Promise((resolve,reject)=>{const callbackName='__dashboardCallback_'+Date.now()+'_'+Math.random().toString(36).slice(2),script=document.createElement('script'),timer=setTimeout(()=>{cleanup();reject(new Error('Tiempo de espera agotado al consultar Apps Script'))},timeoutMs);function cleanup(){clearTimeout(timer);delete window[callbackName];script.remove()}window[callbackName]=json=>{cleanup();resolve(json)};const sep=url.includes('?')?'&':'?';script.src=url+sep+'callback='+encodeURIComponent(callbackName)+'&_='+Date.now();script.onerror=()=>{cleanup();reject(new Error('No se pudo cargar la respuesta JSONP del Web App'))};document.head.appendChild(script)})}
async function loadData(){setLoading();if(!/^https:\/\//.test(API_URL)){showNotice('Configura la URL del Web App consolidado en <b>API_URL</b>.');RAW=[];applyFilters();return}try{const json=await loadJsonp(API_URL);if(json.ok===false)throw new Error(json.error||'Error del Apps Script');RAW=Array.isArray(json.data)?json.data:[];hideNotice();document.getElementById('updatedAt').textContent='Actualizado: '+formatDateTime(json.updatedAt);const s=json.sources||{};document.getElementById('sourceCounts').textContent=`Fuentes: F ${s.factibilidad||0} · A&C ${s.admisibilidadConsistencia||0} · CORE ${s.priorizacionCore||0}`;buildFilters();applyFilters()}catch(err){showNotice('No fue posible cargar el dashboard: <b>'+escapeHtml(err.message)+'</b>. Verifica que el Web App esté desplegado y que el código acepte el parámetro <code>callback</code>.');RAW=[];applyFilters()}}
function setLoading(){document.getElementById('tbody').innerHTML='<tr><td colspan="20" class="loading">Cargando datos…</td></tr>'}
function showNotice(html){const n=document.getElementById('notice');n.innerHTML=html;n.style.display='block'}function hideNotice(){document.getElementById('notice').style.display='none'}
function buildFilters(){fillSelect('fEtapa',unique('etapa'),'Todas');fillSelect('fFondo',unique('fondo'),'Todos');fillSelect('fComuna',unique('comuna'),'Todas');const ev=new Set();RAW.forEach(r=>{if(r.evaluadorFactibilidad)ev.add(r.evaluadorFactibilidad);if(r.evaluadorAC)ev.add(r.evaluadorAC)});fillSelect('fEvaluador',[...ev].sort(localeSort),'Todas/os')}
function unique(key){return[...new Set(RAW.map(r=>clean(r[key])).filter(Boolean))].sort(localeSort)}function fillSelect(id,values,all){const el=document.getElementById(id),old=el.value;el.innerHTML=`<option value="">${all}</option>`+values.map(v=>`<option>${escapeHtml(v)}</option>`).join('');if(values.includes(old))el.value=old}
function applyFilters(){const q=clean(document.getElementById('fBuscar').value).toLowerCase(),etapa=document.getElementById('fEtapa').value,fondo=document.getElementById('fFondo').value,comuna=document.getElementById('fComuna').value,evaluador=document.getElementById('fEvaluador').value;FILTERED=RAW.filter(r=>{if(etapa&&clean(r.etapa)!==etapa)return false;if(fondo&&clean(r.fondo)!==fondo)return false;if(comuna&&clean(r.comuna)!==comuna)return false;if(evaluador&&clean(r.evaluadorFactibilidad)!==evaluador&&clean(r.evaluadorAC)!==evaluador)return false;if(CURRENT_VIEW==='alertas'&&(!Array.isArray(r.alertas)||!r.alertas.length))return false;if(q&&!JSON.stringify(r).toLowerCase().includes(q))return false;return true});sortRows();renderKPIs();renderPipeline();renderTable()}
function normalizeStatus(v){return clean(v).normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ').trim().toUpperCase()}function statusEquals(value,expected){return normalizeStatus(value)===normalizeStatus(expected)}function countExactStatus(field,expected){return FILTERED.filter(r=>statusEquals(r[field],expected)).length}function acValue(r){return clean(r.dictamenAC)||clean(r.estadoAC)}function countExactAC(expected){return FILTERED.filter(r=>statusEquals(acValue(r),expected)).length}
function renderKPIs(){const d=FILTERED,total=d.length,fact=d.filter(r=>statusEquals(r.estadoFactibilidad,'HABILITAR FORMULACIÓN DE EXPEDIENTE')).length,ac=d.filter(r=>statusEquals(acValue(r),'EVALUACIÓN TÉCNICA FAVORABLE')).length,core=d.filter(r=>has(r.acuerdoCoreUrl)||has(r.acuerdoCoreNumero)).length,res=d.filter(r=>has(r.resolucionUrl)||has(r.resolucionNumero)).length,ejec=d.filter(r=>/ejecuci[oó]n|en curso|iniciad/i.test(clean(r.estadoEjecucion))||has(r.fechaInicioEjecucion)).length,alert=d.filter(r=>Array.isArray(r.alertas)&&r.alertas.length).length,montoCore=d.filter(r=>has(r.acuerdoCoreUrl)||has(r.acuerdoCoreNumero)).reduce((a,r)=>a+parseMoney(r.monto),0);document.getElementById('kpis').innerHTML=`${kpi('Proyectos visibles',total,'')}${kpi('Habilitados a formulación',fact,'verde')}${kpi('A&C favorable',ac,'verde')}${kpi('Aprobados CORE',core,'morado')}${kpi('Con resolución',res,'morado')}${kpi('En ejecución',ejec,'amarillo')}${kpi('Alertas',alert,alert?'rojo':'')}${kpi('Monto aprobado CORE',formatMoney(montoCore),'',core+' iniciativas')}`}
function kpi(label,value,cls,detail=''){return`<div class="kpi ${cls}"><div class="label">${label}</div><div class="value">${value}</div>${detail?`<div class="detail">${detail}</div>`:''}</div>`}
function statusClass(label){const n=normalizeStatus(label);if(n==='HABILITAR FORMULACION DE EXPEDIENTE'||n==='EVALUACION TECNICA FAVORABLE')return'verde';if(n==='DESESTIMAR'||n==='DESESTIMADO POR NO SUBSANACION')return'rojo';if(n==='EVALUACION PENDIENTE'||n==='REVISION PENDIENTE'||n==='OBSERVAR PARA SUBSANACION'||n==='CON OBSERVACIONES')return'amarillo';return'gris'}
function statusRow(label,count,total){const pct=total?Math.round(count/total*100):0;return`<div class="status-row"><div><div class="status-label"><span class="pill ${statusClass(label)}">${escapeHtml(label)}</span></div><div class="mini-bar"><i style="width:${pct}%"></i></div></div><div class="status-count">${count}</div></div>`}function stageCard(title,subtitle,rows){return`<article class="stage-card"><div class="stage-card-head"><h3>${escapeHtml(title)}</h3><p>${escapeHtml(subtitle)}</p></div><div class="status-list">${rows}</div></article>`}function milestone(title,count,total){const pct=total?Math.round(count/total*100):0;return`<div class="milestone"><div class="n">${count}</div><div class="t">${escapeHtml(title)}</div><div class="bar"><i style="width:${pct}%"></i></div></div>`}
function renderPipeline(){const total=Math.max(FILTERED.length,1),factRows=FACTIBILIDAD_ESTADOS.map(s=>statusRow(s,countExactStatus('estadoFactibilidad',s),FILTERED.length)).join(''),acRows=AC_ESTADOS.map(s=>statusRow(s,countExactAC(s),FILTERED.length)).join(''),core=FILTERED.filter(r=>has(r.acuerdoCoreUrl)||has(r.acuerdoCoreNumero)).length,res=FILTERED.filter(r=>has(r.resolucionUrl)||has(r.resolucionNumero)).length,ejec=FILTERED.filter(r=>has(r.fechaInicioEjecucion)||/ejecuci[oó]n|en curso|iniciad/i.test(clean(r.estadoEjecucion))).length;document.getElementById('pipeline').innerHTML=stageCard('Etapa de Factibilidad','Estados de revisión de factibilidad',factRows)+stageCard('Admisibilidad y Consistencia Técnica','Dictámenes de la evaluación técnica',acRows)+`<article class="stage-card milestone-card"><div class="stage-card-head"><h3>Etapas posteriores</h3><p>Hitos posteriores a la evaluación técnica</p></div><div class="milestones">${milestone('Aprobado CORE',core,total)}${milestone('Con resolución',res,total)}${milestone('En ejecución',ejec,total)}</div></article>`;document.getElementById('visibleCount').textContent=FILTERED.length+' de '+RAW.length+' proyectos'}
function renderTable(){const cols=VIEWS[CURRENT_VIEW],thead=document.getElementById('thead');thead.innerHTML=cols.map(c=>`<th data-key="${c[0]}" style="min-width:${c[2]}px">${c[1]}${SORT.key===c[0]?(SORT.dir>0?' ▲':' ▼'):''}</th>`).join('');thead.querySelectorAll('th').forEach(th=>th.onclick=()=>{const key=th.dataset.key;if(key.startsWith('_'))return;if(SORT.key===key)SORT.dir*=-1;else{SORT.key=key;SORT.dir=1}sortRows();renderTable()});const tbody=document.getElementById('tbody');if(!FILTERED.length){tbody.innerHTML=`<tr><td colspan="${cols.length}" class="empty">Sin resultados con estos filtros.</td></tr>`;return}tbody.innerHTML=FILTERED.map((r,i)=>`<tr>${cols.map(c=>`<td>${renderCell(c,r,i)}</td>`).join('')}</tr>`).join('');tbody.querySelectorAll('[data-detail]').forEach(b=>b.onclick=()=>openDrawer(FILTERED[Number(b.dataset.detail)]))}
function renderCell(c,r,i){const[key,,,type]=c,v=r[key];if(type==='money')return formatMoney(parseMoney(v));if(type==='date')return formatDate(v);if(type==='status')return statusPill(v);if(type==='stage')return stagePill(v);if(type==='link')return renderLink(v,'Abrir ↗');if(type==='days'){const n=parseInt(v,10);return isNaN(n)?'—':(n>3?`<span class="pill rojo">${n} días</span>`:`${n} días`)}if(type==='alerts'){const a=Array.isArray(v)?v:[];return a.length?`<span class="alert-dot" title="${escapeAttr(a.join(' · '))}">${a.length}</span>`:'—'}if(type==='alertText'){const a=Array.isArray(v)?v:[];return a.length?a.map(x=>`<div class="pill rojo" style="margin:2px;white-space:normal">${escapeHtml(x)}</div>`).join(''):'—'}if(type==='core')return[clean(r.acuerdoCoreNumero),renderLink(r.acuerdoCoreUrl,'Acuerdo ↗')].filter(Boolean).join('<br>')||'—';if(type==='resolution')return[clean(r.resolucionNumero),renderLink(r.resolucionUrl,'Resolución ↗')].filter(Boolean).join('<br>')||'—';if(type==='detail')return`<button class="detail-btn" data-detail="${i}">Ver</button>`;const text=clean(v)||'—';if(key==='nombreProyecto')return`<div class="project">${escapeHtml(text)}</div>`;if(key==='institucion')return`<div class="org">${escapeHtml(text)}</div>`;return escapeHtml(text)}
function statusPill(v){const s=clean(v);if(!s)return'<span class="muted">—</span>';return`<span class="pill ${statusClass(s)}" title="${escapeAttr(s)}">${escapeHtml(s)}</span>`}function stagePill(v){const s=clean(v);if(!s)return'—';let cls='gris';if(/terminada|resoluci[oó]n|aprobado core|priorizado/.test(s.toLowerCase()))cls='morado';if(/favorable|habilitar/.test(s.toLowerCase()))cls='verde';if(/no contin|desestim/.test(s.toLowerCase()))cls='rojo';if(/ejecuci[oó]n/.test(s.toLowerCase()))cls='amarillo';return`<span class="pill ${cls}">${escapeHtml(s)}</span>`}function renderLink(v,label){const s=clean(v);return/^https?:\/\//i.test(s)?`<a class="link" href="${escapeAttr(s)}" target="_blank" rel="noopener">${label}</a>`:''}
function openDrawer(r){const links=[renderLink(r.enlacePautaFactibilidad,'Pauta factibilidad'),renderLink(r.pdfFactibilidad,'PDF factibilidad'),renderLink(r.enlacePautaAC,'Pauta A&C'),renderLink(r.pdfAC,'PDF A&C'),renderLink(r.acuerdoCoreUrl,'Acuerdo CORE'),renderLink(r.resolucionUrl,'Resolución')].filter(Boolean).join(' · ');document.getElementById('drawerContent').innerHTML=`<h2>${escapeHtml(clean(r.nombreProyecto)||'Proyecto')}</h2><div class="muted">Postulación ${escapeHtml(clean(r.nPostulacion))} · ${escapeHtml(clean(r.institucion))}</div><div style="margin-top:10px">${stagePill(r.etapa)} ${links}</div><div class="drawer-grid">${field('Fondo / categoría',[r.fondo,r.categoria].filter(has).join(' · '))}${field('Monto',formatMoney(parseMoney(r.monto)))}${field('Factibilidad',r.estadoFactibilidad)}${field('Evaluador/a factibilidad',r.evaluadorFactibilidad)}${field('Dictamen A&C',r.dictamenAC)}${field('Estado A&C',r.estadoAC)}${field('Pronunciamiento',r.pronunciamiento)}${field('Acuerdo CORE',[r.acuerdoCoreNumero,formatDate(r.acuerdoCoreFecha)].filter(x=>x&&x!=='—').join(' · '))}${field('Resolución',[r.resolucionNumero,formatDate(r.resolucionFecha)].filter(x=>x&&x!=='—').join(' · '))}${field('Ejecución',[formatDate(r.fechaInicioEjecucion),formatDate(r.fechaTerminoEjecucion),r.estadoEjecucion].filter(x=>x&&x!=='—').join(' · '))}${field('Alertas',(r.alertas||[]).join('\n')||'Sin alertas',true)}${field('Resumen',r.resumen||'—',true)}${field('Comentario',r.comentario||r.comentarioAC||'—',true)}</div>`;document.getElementById('drawerBackdrop').style.display='block'}
function field(k,v,wide=false){return`<div class="field ${wide?'wide':''}"><div class="k">${k}</div><div class="v">${escapeHtml(clean(v)||'—')}</div></div>`}function closeDrawer(){document.getElementById('drawerBackdrop').style.display='none'}
function sortRows(){FILTERED.sort((a,b)=>{let av=a[SORT.key],bv=b[SORT.key];if(SORT.key==='monto'){av=parseMoney(av);bv=parseMoney(bv)}else{av=clean(av);bv=clean(bv)}return compare(av,bv)*SORT.dir})}function compare(a,b){if(typeof a==='number'&&typeof b==='number')return a-b;return String(a).localeCompare(String(b),'es',{numeric:true,sensitivity:'base'})}function localeSort(a,b){return String(a).localeCompare(String(b),'es',{sensitivity:'base'})}function parseMoney(v){if(typeof v==='number')return v;const s=clean(v).replace(/[^0-9,-]/g,'').replace(/\./g,'').replace(',','.');const n=Number(s);return Number.isFinite(n)?n:0}function formatMoney(n){return Number(n||0).toLocaleString('es-CL',{style:'currency',currency:'CLP',maximumFractionDigits:0})}function formatDate(v){if(!has(v))return'—';if(typeof v==='string'&&/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(v))return v;const d=new Date(v);return isNaN(d)?escapeHtml(clean(v)):d.toLocaleDateString('es-CL')}function formatDateTime(v){const d=new Date(v);return isNaN(d)?clean(v):d.toLocaleString('es-CL')}function clean(v){return v==null?'':String(v).trim()}function has(v){return clean(v)!==''}function escapeHtml(s){return clean(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}function escapeAttr(s){return escapeHtml(s).replace(/'/g,'&#39;')}
['fBuscar','fEtapa','fFondo','fComuna','fEvaluador'].forEach(id=>document.getElementById(id).addEventListener(id==='fBuscar'?'input':'change',applyFilters));document.getElementById('clearBtn').onclick=()=>{['fBuscar','fEtapa','fFondo','fComuna','fEvaluador'].forEach(id=>document.getElementById(id).value='');applyFilters()};document.getElementById('reloadBtn').onclick=loadData;document.getElementById('tabs').onclick=e=>{const b=e.target.closest('.tab');if(!b)return;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');CURRENT_VIEW=b.dataset.view;SORT={key:'nPostulacion',dir:1};applyFilters()};document.getElementById('drawerClose').onclick=closeDrawer;document.getElementById('drawerBackdrop').onclick=e=>{if(e.target.id==='drawerBackdrop')closeDrawer()};document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDrawer()});loadData();
</script>
